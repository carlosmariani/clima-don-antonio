name: Precios MCBA diario L-V 17hs ART

on:
  schedule:
    # 17:00 hs Argentina (UTC-3) = 20:00 UTC, lunes a viernes
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enviar-precios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generar PDF de precios + clima de manana
        run: python generar_precios.py

      - name: Enviar email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python enviar_email_precios.py

      - name: Commit PDF actualizado al repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios_hoy.pdf informes/precios_hoy.pdf informes/precios_hoy_resumen.json informes/precios_mcba_*.pdf 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Actualizar PDF de precios"
          git push
