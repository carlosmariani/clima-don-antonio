name: Actualizar dashboard del clima

on:
  schedule:
      - cron: '0 */6 * * *'
        workflow_dispatch:
          push:
              branches: [main]
                  paths:
                        - 'config.json'
                              - '*.py'

                              permissions:
                                contents: write

                                jobs:
                                  update:
                                      runs-on: ubuntu-latest
                                          steps:
                                                - name: Checkout repo
                                                        uses: actions/checkout@v4

                                                              - name: Setup Python
                                                                      uses: actions/setup-python@v5
                                                                              with:
                                                                                        python-version: '3.11'
                                                                                                  cache: 'pip'

                                                                                                        - name: Install dependencies
                                                                                                                run: pip install -r requirements.txt
                                                                                                                
                                                                                                                      - name: Generar dashboard
                                                                                                                              run: python generar_dashboard.py
                                                                                                                              
                                                                                                                                    - name: Copiar dashboard como index.html
                                                                                                                                            run: cp dashboard.html index.html
                                                                                                                                            
                                                                                                                                                  - name: Commit dashboard actualizado
                                                                                                                                                          run: |
                                                                                                                                                                    git config user.name "github-actions[bot]"
                                                                                                                                                                              git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                        git add index.html dashboard.html
                                                                                                                                                                                                  git diff --staged --quiet || git commit -m "Actualizar dashboard $(date -u +%Y-%m-%d_%H:%M_UTC)"
                                                                                                                                                                                                            git push
                                                                                                                                                                                                            
