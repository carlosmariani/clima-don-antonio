  <g stroke="#F9A825" stroke-width="2" stroke-linecap="round">
    <line x1="60" y1="20" x2="60" y2="26"/>
    <line x1="46" y1="38" x2="52" y2="38"/>
    <line x1="74" y1="38" x2="68" y2="38"/>
    <line x1="48" y1="26" x2="52" y2="30"/>
